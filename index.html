<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Äntligen Måndag Full Deck</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>
@import url('https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
:root{
  --felt:#1B3A2D; --feltdark:#122A1F; --cream:#F6F1E3; --gold:#C9A227;
  --ink:#22201C; --suitred:#B3352C; --suitred-lt:#E06055; --muted:#9DB8A8;
  --custom:#8F9FBC;
  --slab:'Alfa Slab One',Georgia,serif; --body:'IBM Plex Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  background:radial-gradient(ellipse at 50% 0%, var(--felt) 0%, var(--feltdark) 100%);
  background-attachment:fixed;
  color:var(--cream); font-family:var(--body);
  padding:max(env(safe-area-inset-top),16px) 16px max(env(safe-area-inset-bottom),32px);
}
#app{max-width:430px;margin:0 auto}
button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
input,select{font-family:var(--body);font-size:14px;color:var(--cream);background:rgba(0,0,0,.3);
  border:1px solid rgba(246,241,227,.25);border-radius:8px;padding:8px 10px;width:100%}
input::placeholder{color:rgba(157,184,168,.6)}
select{width:auto}
textarea{font-family:monospace;font-size:11px;color:var(--cream);background:rgba(0,0,0,.3);
  border:1px solid rgba(246,241,227,.25);border-radius:8px;padding:8px;width:100%;height:96px;resize:vertical}
.pill{border-radius:99px;padding:5px 14px;font-size:13px;border:1px solid rgba(246,241,227,.3);color:var(--muted)}
.pill.sel{background:rgba(201,162,39,.15);border-color:var(--gold);color:var(--gold)}
.slab{font-family:var(--slab);font-weight:400}
.panel{background:rgba(246,241,227,.06);border:1px solid rgba(246,241,227,.15);border-radius:16px;padding:18px;margin-bottom:14px}
.eyebrow{color:var(--muted);font-size:12px;letter-spacing:2px;text-transform:uppercase}
.suitrow{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.25);border-radius:10px;padding:8px 10px;font-size:13px}
.suitgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-primary{display:block;width:100%;border-radius:12px;padding:13px;font-family:var(--slab);font-size:18px;background:var(--gold);color:var(--ink)}
.btn-primary:disabled{background:rgba(201,162,39,.3);color:rgba(34,32,28,.5);cursor:default}
.btn-secondary{display:block;width:100%;border-radius:12px;padding:11px;font-family:var(--slab);font-size:15px;
  background:none;border:1px solid rgba(246,241,227,.3);color:var(--cream)}
.btn-secondary:disabled{opacity:.4;cursor:default}
.statgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:rgba(246,241,227,.06);border-radius:12px;padding:12px;text-align:center}
.stat .v{font-family:var(--slab);font-size:22px}
.stat .l{font-size:11px;color:var(--muted)}
.histrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(246,241,227,.08);font-size:13px}
.linkbtn{color:var(--muted);font-size:13px;text-decoration:underline}
.flip3d{transition:transform .45s cubic-bezier(.4,.1,.2,1);transform-style:preserve-3d;position:relative;width:220px;height:320px}
@media (prefers-reduced-motion:reduce){.flip3d{transition:none}}
.cardface{position:absolute;inset:0;border-radius:16px;backface-visibility:hidden;-webkit-backface-visibility:hidden;box-shadow:0 12px 30px rgba(0,0,0,.45)}
.cardback{background:#7E2A22;border:10px solid var(--cream);display:flex;align-items:center;justify-content:center}
.cardback .lattice{position:absolute;inset:8px;border-radius:8px;border:1px solid rgba(201,162,39,.6);
  background-image:repeating-linear-gradient(45deg,rgba(201,162,39,.5) 0 1px,transparent 1px 9px),repeating-linear-gradient(-45deg,rgba(201,162,39,.5) 0 1px,transparent 1px 9px)}
.cardback .tag{position:relative;font-family:var(--slab);color:var(--gold);font-size:15px;background:#7E2A22;padding:6px 10px;border-radius:8px;border:1px solid rgba(201,162,39,.6)}
.cardfront{background:var(--cream)}
.corner{position:absolute;text-align:center;font-family:var(--slab);font-size:26px;line-height:1}
.corner .s{font-family:var(--body);font-size:22px}
.corner.tl{top:8px;left:12px}
.corner.br{bottom:8px;right:12px;transform:rotate(180deg)}
.bigsuit{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:110px}
.jokerword{position:absolute;left:0;right:0;bottom:26px;text-align:center;font-family:var(--slab);font-size:20px;letter-spacing:4px}
.courtwrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:38px 48px}
.courtwrap svg{width:100%;height:100%}
.confirm{background:rgba(0,0,0,.3);border:1px solid rgba(246,241,227,.2);border-radius:12px;padding:12px;width:100%}
.confirm .row{display:flex;gap:8px;margin-top:8px}
.confirm button{flex:1;border-radius:8px;padding:8px;font-size:13px}
.optrow{display:flex;align-items:center;gap:10px;margin-top:10px}
.optrow label{font-size:13px;color:var(--muted);white-space:nowrap}
.custominput{display:flex;align-items:center;gap:8px;margin-top:8px}
.custominput .s{font-size:20px;width:24px;text-align:center}
.noselect{-webkit-user-select:none;user-select:none}
.homegrid{display:block}
.workwrap{display:flex;flex-direction:column;align-items:center;width:100%;max-width:430px;margin:0 auto}
.workgrid{display:flex;flex-direction:column;align-items:center;width:100%}
.workinfo{width:100%}
.callout{text-align:center;margin:18px 0 14px;min-height:74px}
@media (min-width:760px){
  #app{max-width:960px}
  body{padding-top:32px}
  .homegrid{display:grid;grid-template-columns:1fr 1fr;gap:0 22px;align-items:start}
  .workwrap{max-width:780px}
  .workgrid{display:grid;grid-template-columns:auto 1fr;gap:36px;align-items:center;justify-items:start;margin-top:10px}
  .workinfo .callout{text-align:left;margin:0 0 18px;min-height:0}
  .workinfo #endzone{text-align:left !important}
  .flip3d{width:280px;height:407px}
  .corner{font-size:32px}
  .corner .s{font-size:27px}
  .bigsuit{font-size:140px}
  .jokerword{font-size:26px;bottom:34px}
}
.chip{position:fixed;left:0;top:0;pointer-events:none;z-index:999;will-change:transform,opacity}
.chip svg{width:100%;height:100%;filter:drop-shadow(0 2px 3px rgba(0,0,0,.35))}

<body>
<div id="app"></div>
<script>
"use strict";
// ---------- Constants ----------
const KEY = "fulldeck:v1";
const SUITS = ["\u2660","\u2665","\u2666","\u2663"]; // spade heart diamond club
const RED_SUITS = new Set(["\u2665","\u2666"]);
const JOKER_STAR = "\u2605";
const WORKOUTS = [
  {letter:"A", color:"#C9A227"},
  {letter:"B", color:"#8FBC9F"},
  {letter:"C", color:"#C0564A"},
];
const CUSTOM_COLOR = "#8F9FBC";
const DEFAULT_EX = [
  ["Push-ups","Squats","Sit-ups","Supermans"],
  ["Pike push-ups","Alternating lunges","Mountain climbers","Glute bridges"],
  ["Triceps dips","Jump squats","Bicycle crunches","Burpees"],
];

// ---------- Strings (EN / SV) ----------
const STR = {

  tagline:"52 cards \u00b7 4 exercises \u00b7 whole body in 3 sessions",
  upNext:"Up next in your cycle",
  workoutN:"Workout {l}",
  startWorkout:"Start Workout {l}",

  startCustom:"Start custom deck", cancel:"Cancel", close:"Close",
  options:"Options",

  sound:"Sound effects", on:"On", off:"Off",
  language:"Language",
  editWorkouts:"Edit workouts",
  editDesc:"Change the four exercises in each workout. Applies from your next session.",
  restoreDefaults:"Restore defaults",
  dataBtn:"Export / import data",
  dataDesc:"Copy this text to back up or move your data to another device. Paste a backup here and press Import to restore.",
  exportBtn:"Export", importBtn:"Import",
  copied:"Exported \u2014 copied to clipboard.", exported:"Exported \u2014 copy the text above.",
  importOk:"Data imported.", importBad:"Couldn\u2019t read that data \u2014 nothing was changed.",
  statDecks:"decks completed", statBest:"best time", statReps:"total reps",

  chartEmpty:"No completed decks yet. Your first full deck starts the chart.",
  history:"History", endedAt:"ended at",
  reset:"Reset all statistics",
  resetConfirm:"Delete all history, times and cycle progress? This can\u2019t be undone.",
  deleteAll:"Delete everything",
  cardsLeft:"Cards left", tapToDraw:"TAP TO DRAW", nextCard:"NEXT CARD",
  readyLine:"Tap the deck when you\u2019re ready. The clock is running.",
  finishDeckBtn:"Finish deck \u2014 stop the clock",
  endEarly:"End workout early",
  endConfirm:"End at {x}/{y} cards? This won\u2019t count toward your cycle.",
  saveUnfinished:"Save as unfinished", discard:"Discard", keepGoing:"Keep going",
  deckComplete:"Deck complete", cardsWord:"cards", customDeck:"Custom deck",
  newBest:"New best time.", timeSaved:"Time saved to your chart.",
  upNextShort:"Up next:", back:"Back to overview",
},
sv: {
  tagline:"52 kort \u00b7 4 \u00f6vningar \u00b7 hela kroppen p\u00e5 3 pass",
  upNext:"N\u00e4sta i din cykel",
  workoutN:"Pass {l}",
  startWorkout:"Starta pass {l}",
  inProgress:"P\u00e5g\u00e5ende pass",
  resumeLine:"{a} \u2014 {x} av {y} kort dragna. Tryck f\u00f6r att forts\u00e4tta.",
  finishFirst:"Avsluta p\u00e5g\u00e5ende pass f\u00f6rst.",
  tag0:"Grund", tag1:"Dynamik", tag2:"Kraft", tagCustom:"Egen",
  customBtn:"Egen eng\u00e5ngskortlek",
  customHint:"V\u00e4lj fyra egna \u00f6vningar. P\u00e5verkar inte din A\u2013B\u2013C-cykel.",
  customDesc:"En \u00f6vning per f\u00e4rg. Passet r\u00e4knas inte in i cykeln.",
  startCustom:"Starta egen kortlek", cancel:"Avbryt", close:"St\u00e4ng",
  options:"Alternativ",
  jokersIn:"Jokrar i leken", jokerTask:"Jokeruppgift",
  jokerHint:"Jokrar blandas in i varje kortlek du startar och f\u00e5r en egen uppgift ist\u00e4llet f\u00f6r reps.",
  sound:"Ljudeffekter", on:"P\u00e5", off:"Av",
  language:"Spr\u00e5k",
  editWorkouts:"Redigera passen",
  editDesc:"\u00c4ndra de fyra \u00f6vningarna i varje pass. G\u00e4ller fr\u00e5n n\u00e4sta pass.",
  restoreDefaults:"\u00c5terst\u00e4ll standard",
  dataBtn:"Exportera / importera data",
  dataDesc:"Kopiera texten f\u00f6r att s\u00e4kerhetskopiera eller flytta din data till en annan enhet. Klistra in en kopia h\u00e4r och tryck Importera f\u00f6r att \u00e5terst\u00e4lla.",
  exportBtn:"Exportera", importBtn:"Importera",
  copied:"Exporterad \u2014 kopierad till urklipp.", exported:"Exporterad \u2014 kopiera texten ovan.",
  importOk:"Data importerad.", importBad:"Kunde inte l\u00e4sa datan \u2014 inget \u00e4ndrades.",
  statDecks:"klara kortlekar", statBest:"b\u00e4sta tid", statReps:"totalt reps",
  chartTitle:"Passtid, minuter",
  chartEmpty:"Inga klara kortlekar \u00e4n. Din f\u00f6rsta fulla kortlek startar diagrammet.",
  history:"Historik", endedAt:"avbr\u00f6ts vid",
  reset:"Nollst\u00e4ll all statistik",
  resetConfirm:"Radera all historik, tider och cykelposition? Detta kan inte \u00e5ngras.",
  deleteAll:"Radera allt",
  cardsLeft:"Kort kvar", tapToDraw:"TRYCK H\u00c4R", nextCard:"N\u00c4STA KORT",
  readyLine:"Tryck p\u00e5 leken n\u00e4r du \u00e4r redo. Klockan g\u00e5r.",
  finishDeckBtn:"Avsluta leken \u2014 stoppa klockan",
  endEarly:"Avsluta i f\u00f6rtid",
  endConfirm:"Avsluta vid {x}/{y} kort? R\u00e4knas inte in i cykeln.",
  saveUnfinished:"Spara som oavslutat", discard:"Sl\u00e4ng", keepGoing:"Forts\u00e4tt",
  deckComplete:"Kortleken klar", cardsWord:"kort", customDeck:"Egen kortlek",
  newBest:"Nytt personb\u00e4sta!", timeSaved:"Tiden \u00e4r sparad i diagrammet.",
  upNextShort:"H\u00e4rn\u00e4st:", back:"Tillbaka till \u00f6versikten",
}
};
function t(k, vars){
  const lang = (store && store.settings && store.settings.lang) || "en";
  let s = (STR[lang] && STR[lang][k]) || STR.en[k] || k;
  if(vars) for(const key in vars) s = s.split("{"+key+"}").join(vars[key]);
  return s;
}

// ---------- State ----------
function defaultSettings(){
  return {jokers:0, jokerEx:"60 s plank", sound:true, lang:"en",
          exercises: DEFAULT_EX.map(a=>a.slice())};
}
let store = {programIndex:0, history:[], settings: defaultSettings()};
let active = null;
let screen = "home";
let current = null;
let rot = 0;
let animating = false;
let confirmEnd = false;
let confirmReset = false;
let showCustom = false;
let showEditor = false;
let showData = false;
let dataMsg = "";
let lastResult = null;

// ---------- Persistence (on-device) ----------
function validExercises(x){
  return Array.isArray(x) && x.length===3 && x.every(w =>
    Array.isArray(w) && w.length===4 && w.every(e => typeof e==="string" && e.trim().length>0));
}
function mergeSettings(s){
  const base = defaultSettings();
  if(s && typeof s==="object"){
    const j = parseInt(s.jokers,10);
    if(j===0||j===1||j===2) base.jokers = j;
    if(typeof s.jokerEx==="string" && s.jokerEx.trim()) base.jokerEx = s.jokerEx.trim().slice(0,40);
    if(typeof s.sound==="boolean") base.sound = s.sound;
    if(s.lang==="en"||s.lang==="sv") base.lang = s.lang;
    if(validExercises(s.exercises)) base.exercises = s.exercises.map(w=>w.map(e=>e.trim().slice(0,40)));
  }
  return base;
}
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){
      const p = JSON.parse(raw);
      store = {
        programIndex: [0,1,2].includes(p.programIndex) ? p.programIndex : 0,
        history: Array.isArray(p.history) ? p.history : [],
        settings: mergeSettings(p.settings)
      };
      active = p.active || null;
      if(active && active.group) active = null; // group decks (removed feature) were never tracked
      if(active){
        if(!active.total) active.total = Array.isArray(active.deck) ? active.drawn + active.deck.length : 52;
        if(!active.meta || !active.ex){
          const idx = active.workoutIdx;
          if(typeof idx==="number" && idx>=0 && idx<WORKOUTS.length){
            if(!active.meta) active.meta = {letter:WORKOUTS[idx].letter, color:WORKOUTS[idx].color};
            if(!active.ex) active.ex = exFor(idx);
          } else if(!active.ex){
            active = null; // unrecoverable session data
          }
        }
        if(active && !active.jokerEx) active.jokerEx = store.settings.jokerEx || "Joker task";
      }
      current = active && active.current ? active.current : null;
      rot = current ? 180 : 0;
    }
  }catch(e){ console.error("Could not load saved data", e); }
}
function save(){
  try{
    localStorage.setItem(KEY, JSON.stringify({programIndex:store.programIndex, history:store.history, settings:store.settings, active:active}));
  }catch(e){ console.error("Could not save", e); }
}

// ---------- Helpers ----------
function rankLabel(v){ return ({11:"J",12:"Q",13:"K",14:"A"})[v] || String(v); }
function buildDeck(jokers){
  const d=[];
  for(const s of SUITS) for(let v=2;v<=14;v++) d.push({s,v});
  for(let i=0;i<(jokers||0);i++) d.push({joker:true});
  for(let i=d.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [d[i],d[j]]=[d[j],d[i]]; }
  return d;
}
function fmtTime(sec){
  const h=Math.floor(sec/3600), m=Math.floor(sec%3600/60), s=sec%60;
  const mm=String(m).padStart(2,"0"), ss=String(s).padStart(2,"0");
  return h>0 ? h+":"+mm+":"+ss : m+":"+ss;
}
function fmtDate(iso){ const d=new Date(iso); return d.getDate()+"/"+(d.getMonth()+1); }
function elapsed(){ return active ? Math.max(0, Math.floor((Date.now()-active.startEpoch)/1000)) : 0; }
function suitColor(s, light){ return RED_SUITS.has(s) ? (light?"var(--suitred-lt)":"var(--suitred)") : (light?"var(--cream)":"var(--ink)"); }
function entryMeta(e){ return e.workout>=0 ? WORKOUTS[e.workout] : {letter:"X", color:CUSTOM_COLOR}; }
function exFor(i){ const m={}; SUITS.forEach((s,j)=>{ m[s]=store.settings.exercises[i][j]; }); return m; }
function sessionTitle(){ return active.workoutIdx>=0 ? t("workoutN",{l:active.meta.letter}) : t("customDeck"); }
function sessionTag(){ return active.workoutIdx>=0 ? t("tag"+active.workoutIdx) : t("tagCustom"); }
function escapeHtml(x){
  return String(x).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

// ---------- Sound effects (generated, no files) ----------
let audioCtx = null;
function snd(fn){
  if(!store.settings.sound) return;
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    if(!audioCtx) audioCtx = new AC();
    if(audioCtx.state==="suspended") audioCtx.resume();
    fn(audioCtx);
  }catch(e){}
}
function sndSnap(){
  snd(ctx=>{
    const t0 = ctx.currentTime;
    const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.05), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/d.length,2);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter(); f.type="bandpass"; f.frequency.value=1800; f.Q.value=0.8;
    const g = ctx.createGain(); g.gain.setValueAtTime(0.5, t0);
    src.connect(f); f.connect(g); g.connect(ctx.destination);
    src.start(t0);
  });
}
function sndDing(freq, dur, vol, delay){
  snd(ctx=>{
    const t0 = ctx.currentTime + (delay||0);
    const o = ctx.createOscillator(); o.type="sine"; o.frequency.value = freq;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol||0.25, t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+(dur||0.18));
    o.connect(g); g.connect(ctx.destination);
    o.start(t0); o.stop(t0+(dur||0.18)+0.05);
  });
}
function sndFanfare(){ sndDing(659,0.16,0.22,0); sndDing(830,0.16,0.22,0.13); sndDing(988,0.34,0.26,0.26); }
function sndJoker(){ sndDing(392,0.12,0.2,0.05); sndDing(523,0.2,0.2,0.16); }
function toggleSound(){
  store.settings.sound = !store.settings.sound; save(); render();
  if(store.settings.sound) sndDing(880,0.15,0.2,0);
}

// ---------- Wake lock (keep screen on during a workout) ----------
let wakeLock = null;
async function acquireWake(){
  try{
    if(navigator.wakeLock && !wakeLock){
      wakeLock = await navigator.wakeLock.request("screen");
      wakeLock.addEventListener && wakeLock.addEventListener("release", ()=>{ wakeLock=null; });
    }
  }catch(e){ wakeLock=null; }
}
function releaseWake(){
  try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){ wakeLock=null; }
}
if(typeof document.addEventListener==="function"){
  document.addEventListener("visibilitychange", ()=>{
    if(document.visibilityState==="visible" && screen==="workout" && active) acquireWake();
  });
}

// ---------- Actions ----------
function beginSession(workoutIdx, meta, ex){
  const jokers = Math.max(0, Math.min(2, parseInt(store.settings.jokers,10)||0));
  const deck = buildDeck(jokers);
  active = {workoutIdx:workoutIdx, meta:meta, ex:ex, jokerEx:store.settings.jokerEx||"Joker task",
            deck:deck, total:deck.length, drawn:0, startEpoch:Date.now(), current:null};
  current=null; rot=0; confirmEnd=false; animating=false; showCustom=false; showEditor=false; showData=false;
  save(); screen="workout"; render();
}
function startWorkout(idx){
  const w = WORKOUTS[idx];
  beginSession(idx, {letter:w.letter, color:w.color}, exFor(idx));
}
function startCustom(){
  const ex = {};
  for(let i=0;i<4;i++){
    const el = document.getElementById("cx"+i);
    const v = el && el.value.trim() ? el.value.trim() : ("Exercise "+SUITS[i]);
    ex[SUITS[i]] = v;
  }
  beginSession(-1, {letter:"X", color:CUSTOM_COLOR}, ex);
}
function resumeWorkout(){ confirmEnd=false; screen="workout"; render(); }
function draw(){
  if(!active || animating || active.deck.length===0) return;
  animating=true;
  const next = active.deck[0];
  active = Object.assign({}, active, {deck:active.deck.slice(1), drawn:active.drawn+1, current:next});
  rot += 180;
  const showB = ((rot/180)%2)===1; // odd half-turns show faceB, even show faceA
  const flip = document.getElementById("flip");
  if(flip) flip.style.transform = "rotateY("+rot+"deg)";
  sndSnap();
  if(next.joker) sndJoker();
  setTimeout(()=>{ current=next; paintFace(showB); updateCallout(); }, 220);
  setTimeout(()=>{ animating=false; }, 460);
  updateCounters();
  save();
}
function finishDeck(){
  if(!active) return;
  const durationSec = Math.max(1, Math.round((Date.now()-active.startEpoch)/1000));
  const entry = {date:new Date().toISOString(), workout:active.workoutIdx, durationSec,
                 cardsDone:active.drawn, cardsTotal:active.total, completed:true};
  const nextIdx = active.workoutIdx>=0 ? (active.workoutIdx+1)%3 : store.programIndex; // custom decks don't advance the cycle
  store = Object.assign({}, store, {programIndex:nextIdx, history:store.history.concat([entry])});
  active=null; lastResult=entry;
  save(); screen="done"; render();
  sndFanfare();
  chipExplosion();
}

// ---------- Potato chip celebration ----------
function chipSVG(v){
  const grad = '<defs><radialGradient id="chipg" cx="35%" cy="30%" r="85%">'
    + '<stop offset="0%" stop-color="#F7DE9B"/><stop offset="55%" stop-color="#EDBE55"/>'
    + '<stop offset="100%" stop-color="#C98F2B"/></radialGradient></defs>';
  const speckles = '<circle cx="15" cy="14" r="1.1" fill="#A8741F" opacity=".55"/>'
    + '<circle cx="25" cy="22" r="1.3" fill="#A8741F" opacity=".45"/>'
    + '<circle cx="18" cy="27" r="1" fill="#8F6318" opacity=".5"/>'
    + '<circle cx="27" cy="12" r=".9" fill="#8F6318" opacity=".45"/>';
  let shape;
  if(v===0){ // classic round chip with wavy edge
    shape = '<path d="M20 3 Q28 1 33 8 Q40 14 36 22 Q39 30 30 35 Q22 41 13 36 Q4 33 4 24 Q1 15 9 8 Q13 2 20 3 Z" fill="url(#chipg)" stroke="#B07C22" stroke-width="1.2"/>'
      + '<path d="M11 12 Q16 7 24 8" fill="none" stroke="#F9E9B8" stroke-width="2" stroke-linecap="round" opacity=".7"/>';
  } else if(v===1){ // folded chip
    shape = '<path d="M5 24 Q6 11 20 7 Q34 11 35 24 Q28 31 20 31 Q12 31 5 24 Z" fill="url(#chipg)" stroke="#B07C22" stroke-width="1.2"/>'
      + '<path d="M5 24 Q20 17 35 24 Q28 31 20 31 Q12 31 5 24 Z" fill="#B07C22" opacity=".35"/>'
      + '<path d="M5 24 Q20 17 35 24" fill="none" stroke="#8F6318" stroke-width="1.2" opacity=".8"/>'
      + '<path d="M11 13 Q15 9 21 9" fill="none" stroke="#F9E9B8" stroke-width="2" stroke-linecap="round" opacity=".7"/>';
  } else { // chip with a bite taken out
    shape = '<path d="M20 3 Q31 3 36 12 Q40 21 34 29 Q31 25 27 27 Q28 31 25 34 Q17 39 9 33 Q2 26 4 16 Q8 4 20 3 Z" fill="url(#chipg)" stroke="#B07C22" stroke-width="1.2"/>'
      + '<path d="M10 11 Q15 6 22 7" fill="none" stroke="#F9E9B8" stroke-width="2" stroke-linecap="round" opacity=".7"/>';
  }
  return '<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">'+grad+shape+speckles+'</svg>';
}
function chipExplosion(){
  try{
    if(!window.requestAnimationFrame || !document.body) return;
    if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    const parts = [];
    const cx = window.innerWidth/2, cy = Math.min(window.innerHeight*0.32, 280);
    function burst(count){
      for(let i=0;i<count;i++){
        const el = document.createElement("div");
        el.className = "chip";
        el.innerHTML = chipSVG(i%3);
        const size = 20 + Math.random()*26;
        el.style.width = size+"px"; el.style.height = size+"px";
        el.style.transform = "translate("+cx+"px,"+cy+"px)";
        document.body.appendChild(el);
        const a = Math.random()*Math.PI*2;
        const sp = 170 + Math.random()*380;
        parts.push({el, x:cx, y:cy, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-280, r:Math.random()*360, vr:(Math.random()-0.5)*900});
      }
    }
    burst(24);
    setTimeout(()=>burst(18), 1400); // second wave keeps the rain going
    const g = 620, dur = 4000;
    let start = null, last = null;
    function step(ts){
      if(start===null){ start = ts; last = ts; }
      const dt = Math.min(0.05, (ts-last)/1000); last = ts;
      const tt = ts - start;
      for(const p of parts){
        p.vy += g*dt; p.x += p.vx*dt; p.y += p.vy*dt; p.r += p.vr*dt;
        p.el.style.transform = "translate("+p.x.toFixed(1)+"px,"+p.y.toFixed(1)+"px) rotate("+p.r.toFixed(1)+"deg)";
        if(tt > dur-600) p.el.style.opacity = String(Math.max(0,(dur-tt)/600));
      }
      if(tt < dur) window.requestAnimationFrame(step);
      else parts.forEach(p=>p.el.remove());
    }
    window.requestAnimationFrame(step);
  }catch(e){ console.error("chip explosion failed", e); }
}

function chartSVG(completed){
  if(completed.length===0){
    return '<div style="padding:32px 0;text-align:center;color:var(--muted);font-size:14px">'+t("chartEmpty")+'</div>';
  }
  const data = completed.slice(-14);
  const W=360, H=170, padB=22, padT=16, padL=6, padR=6;
  const max = Math.max.apply(null, data.map(d=>d.durationSec/60)) * 1.15;
  const bw = (W-padL-padR)/data.length;
  let bars='';
  data.forEach((d,i)=>{
    const min = d.durationSec/60;
    const bh = (min/max)*(H-padB-padT);
    const x = padL + i*bw + bw*0.15, y = H-padB-bh;
    bars += '<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+(bw*0.7).toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="3" fill="'+entryMeta(d).color+'"/>'
      + '<text x="'+(x+bw*0.35).toFixed(1)+'" y="'+(y-4).toFixed(1)+'" text-anchor="middle" font-size="9" fill="#9DB8A8">'+min.toFixed(0)+'</text>'
      + '<text x="'+(x+bw*0.35).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9" fill="#9DB8A8">'+fmtDate(d.date)+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto" role="img" aria-label="Workout durations chart">'+bars+'</svg>';
}

      + '<path d="M38 88 L50 94 L62 88" fill="none" stroke="'+G+'" stroke-width="2.4"/>' + chest;
  } else if(v===12){ // Queen
    fig = '<circle cx="50" cy="58" r="16" fill="'+P+'"/>'
      + '<circle cx="50" cy="59" r="12" fill="'+S+'" stroke="'+P+'" stroke-width="1.2"/>'
      + '<path d="M36 38 L42 29 L50 35 L58 29 L64 38 Z" fill="'+G+'" stroke="'+P+'" stroke-width="1.4"/>'
      + '<circle cx="42" cy="27" r="1.8" fill="'+P+'"/><circle cx="58" cy="27" r="1.8" fill="'+P+'"/><circle cx="50" cy="33" r="1.6" fill="'+P+'"/>'
      + '<circle cx="45" cy="57" r="1.4" fill="'+P+'"/><circle cx="55" cy="57" r="1.4" fill="'+P+'"/>'
      + '<path d="M46 65 Q50 68 54 65" fill="none" stroke="'+P+'" stroke-width="1.3" stroke-linecap="round"/>'
      + '<circle cx="36" cy="62" r="1.8" fill="'+G+'"/><circle cx="64" cy="62" r="1.8" fill="'+G+'"/>'
      + '<path d="M24 118 Q27 94 40 89 L50 95 L60 89 Q73 94 76 118 Z" fill="'+P+'"/>'
      + '<path d="M42 92 Q50 99 58 92" fill="none" stroke="'+G+'" stroke-width="2"/>' + chest;
  } else { // Jack
    fig = '<path d="M34 42 Q34 26 52 25 Q68 26 66 38 L61 43 Q50 36 38 45 Z" fill="'+P+'"/>'
      + '<path d="M63 30 Q74 17 79 21 Q74 30 65 35 Z" fill="'+G+'" stroke="'+P+'" stroke-width="1.2"/>'
      + '<circle cx="50" cy="57" r="12" fill="'+S+'" stroke="'+P+'" stroke-width="1.5"/>'
      + '<circle cx="45.5" cy="55" r="1.4" fill="'+P+'"/><circle cx="55" cy="55" r="1.4" fill="'+P+'"/>'
      + '<path d="M46 63 Q50 66 54 63" fill="none" stroke="'+P+'" stroke-width="1.3" stroke-linecap="round"/>'
      + '<path d="M25 118 Q27 95 40 89 L50 94 L60 89 Q73 95 75 118 Z" fill="'+P+'"/>'
      + '<path d="M40 89 L68 118 L59 118 L36 93 Z" fill="'+G+'" opacity=".95"/>' + chest;
  }
  return '<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">'+frame+fig+'</svg>';
}
function cardFaceHTML(){
  if(!current) return '';
  if(current.joker){
    return '<div class="corner tl" style="color:var(--gold)">'+JOKER_STAR+'</div>'
      + '<div class="corner br" style="color:var(--gold)">'+JOKER_STAR+'</div>'
      + '<div class="bigsuit" style="color:var(--gold);font-size:90px;padding-bottom:20px">'+JOKER_STAR+'</div>'
      + '<div class="jokerword" style="color:var(--suitred)">JOKER</div>';
  }
  const col = suitColor(current.s,false);
  const center = (current.v>=11 && current.v<=13)
    ? '<div class="courtwrap">'+courtSVG(current.v, current.s)+'</div>'
    : '<div class="bigsuit" style="color:'+col+'">'+current.s+'</div>';
  return '<div class="corner tl" style="color:'+col+'">'+rankLabel(current.v)+'<div class="s">'+current.s+'</div></div>'
    + '<div class="corner br" style="color:'+col+'">'+rankLabel(current.v)+'<div class="s">'+current.s+'</div></div>'
    + center;
}
function calloutHTML(){
  if(!current) return '<div style="color:var(--muted);font-size:14px;padding-top:20px">'+t("readyLine")+'</div>';
  if(current.joker){
    return '<div class="slab" style="font-size:34px;color:var(--gold);line-height:1.1">JOKER</div>'
      + '<div class="slab" style="font-size:22px">'+escapeHtml(active.jokerEx)+'</div>';
  }
  return '<div class="slab" style="font-size:40px;color:var(--gold);line-height:1">'+current.v+' <span style="font-size:24px;color:var(--cream)">\u00d7</span></div>'
    + '<div class="slab" style="font-size:24px">'+escapeHtml(active.ex[current.s])+'</div>';
}
function bottomZoneHTML(){
  if(active.deck.length===0){
    return '<button class="btn-primary" style="padding:16px;font-size:20px" onclick="finishDeck()">'+t("finishDeckBtn")+'</button>';
  }
  return '<div class="suitgrid" style="gap:6px">'
    + SUITS.map(s=>'<div class="suitrow" style="padding:6px 10px;font-size:12px"><span style="font-size:16px;color:'+suitColor(s,true)+'">'+s+'</span><span style="color:var(--muted)">'+escapeHtml(active.ex[s])+'</span></div>').join('')
    + '</div>';
}
function endZoneHTML(){
  if(!confirmEnd) return '<button class="linkbtn" onclick="setConfirmEnd(true)">'+t("endEarly")+'</button>';
  return '<div class="confirm"><div style="font-size:13px;text-align:center">'+t("endConfirm",{x:active.drawn, y:active.total})+'</div>'
    + '<div class="row">'
    + '<button onclick="endEarly(true)" style="background:rgba(246,241,227,.15);color:var(--cream)">'+t("saveUnfinished")+'</button>'
    + '<button onclick="endEarly(false)" style="background:rgba(192,86,74,.35);color:var(--cream)">'+t("discard")+'</button>'
    + '<button onclick="setConfirmEnd(false)" style="border:1px solid rgba(246,241,227,.25);color:var(--muted)">'+t("keepGoing")+'</button>'
    + '</div></div>';
}
function doneHTML(){
  const completed = store.history.filter(h=>h.completed);
  const best = completed.length ? Math.min.apply(null, completed.map(h=>h.durationSec)) : null;
  const isBest = best===lastResult.durationSec && completed.length>1;
  const m = entryMeta(lastResult);
  const nw = WORKOUTS[store.programIndex];
  const icon = lastResult.workout>=0 ? SUITS[lastResult.workout%4] : JOKER_STAR;
  const title = lastResult.workout>=0 ? t("workoutN",{l:m.letter}) : t("customDeck");
  return '<div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:40px">'
    + '<div style="font-size:60px">'+icon+'</div>'
    + '<div class="slab" style="font-size:30px;color:var(--gold);margin-top:8px">'+t("deckComplete")+'</div>'
    + '<div style="color:var(--muted);font-size:14px;margin-bottom:24px">'+title+' \u00b7 '+(lastResult.cardsTotal||52)+' '+t("cardsWord")+' \u00b7 416 reps'+((lastResult.cardsTotal||52)>52?' + jokers':'')+'</div>'
    + '<div class="slab" style="font-size:54px;line-height:1">'+fmtTime(lastResult.durationSec)+'</div>'
    + '<div style="color:var(--muted);font-size:13px;margin-top:6px">'+(isBest?t("newBest"):t("timeSaved"))+'</div>'
    + '<div style="background:rgba(246,241,227,.06);border-radius:12px;padding:12px 16px;margin:32px 0 24px;font-size:14px">'+t("upNextShort")+' <span class="slab" style="color:'+nw.color+'">'+t("workoutN",{l:nw.letter})+'</span> \u00b7 '+t("tag"+store.programIndex)+'</div>'
    + '<button class="btn-primary" onclick="goHome()">'+t("back")+'</button>'
    + '</div>';
}

function render(){
  const root = document.getElementById("app");
  try{
    root.innerHTML = screen==="home" ? homeHTML() : screen==="workout" ? workoutHTML() : doneHTML();
  }catch(e){
    console.error("Render failed, recovering:", e);
    active=null; current=null; rot=0; screen="home";
    try{ root.innerHTML = homeHTML(); }
    catch(e2){ root.innerHTML = '<div style="padding:40px;text-align:center">Something went wrong loading saved data.<br><br><button onclick="resetAll()" style="text-decoration:underline;color:#C9A227">Reset all data</button></div>'; }
  }
  if(screen==="workout" && active) acquireWake(); else releaseWake();
}
function updateCounters(){
  const cl=document.getElementById("cardsleft"), pr=document.getElementById("progress"), bt=document.getElementById("backtag"), bz=document.getElementById("bottomzone");
  if(cl) cl.textContent = active.deck.length;
  if(pr) pr.style.width = ((active.drawn/active.total)*100)+"%";
  if(bt) bt.textContent = t("nextCard");
  if(bz && active.deck.length===0) bz.innerHTML = bottomZoneHTML();
}
function paintFace(showB){
  const el = document.getElementById(showB ? "faceB" : "faceA");
  if(!el) return;
  el.className = "cardface cardfront"; // converts the card back into a face on its first use
  el.style.transform = showB ? "rotateY(180deg)" : "";
  el.innerHTML = cardFaceHTML();
}
function updateCallout(){ const el=document.getElementById("callout"); if(el) el.innerHTML = calloutHTML(); }
function renderEndZone(){ const el=document.getElementById("endzone"); if(el) el.innerHTML = endZoneHTML(); }

// Timer tick
setInterval(()=>{
  if(screen==="workout" && active){
    const tEl=document.getElementById("timer");
    if(tEl) tEl.textContent = fmtTime(elapsed());
  }
}, 1000);

// Offline support
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{ navigator.serviceWorker.register("./sw.js").catch(()=>{}); });
}

load();
render();
</script>
</body>
</html>
